name: "ShopGUIPlus-SellGUI"
prefix: "ShopGUIPlus Sell GUI"
description: "An addon for ShopGUIPlus that enables players to easily sell items in seconds, without having to go searching through the shops for them."
website: "https://www.spigotmc.org/resources/85170/"

main: "net.mackenziemolloy.shopguiplus.sellgui.SellGUI"
version: "1.1.8"
api-version: "1.13"
folia-supported: true

authors:
  - "Mackenzie Molloy"
  - "SirBlobman"

depend:
  - "ShopGUIPlus"

softdepend:
  - "ShopGUIPlus-DynaShop"

commands:
  sellgui:
    description: "Sell Command"
    permission: "sellgui.use"
    permission-message: "§cYou do not have permission"
    aliases:
      - "sg"
      - "sellg"

permissions:
  sellgui.use:
    description: "Access to /sellgui (opens the sell GUI)"
    default: op
  sellgui.reload:
    description: "Access to /sellgui reload"
    default: op
    children:
      sellgui.use: true
  sellgui.dump:
    description: "Access to /sellgui dump / debug"
    default: op
    children:
      sellgui.use: true
